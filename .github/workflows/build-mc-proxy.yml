name: Build MC Proxy Rules

on:
workflow_dispatch:

schedule:
- cron: ‘0 3 * * *’

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4
  - name: Build mc-proxy.list
    shell: bash
    run: |
      set -e
      mkdir -p loon
      cat > loon/mc-proxy.list <<EOF
      # REPO: https://github.com/hk-js/shuntingRule
      # GENERATED BY GITHUB ACTION
      # UPDATED: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
      EOF
      while IFS= read -r url; do
        [ -z "$url" ] && continue
        [[ "$url" =~ ^# ]] && continue
        echo "" >> loon/mc-proxy.list
        echo "# SOURCE: $url" >> loon/mc-proxy.list
        if curl -fsSL "$url" \
          | grep -v '^#' \
          | grep -v '^$' \
          >> loon/mc-proxy.list
        then
          echo "Loaded: $url"
        else
          echo "# FAILED: $url" >> loon/mc-proxy.list
        fi
      done < rules/proxy-source.txt
      awk '!seen[$0]++' loon/mc-proxy.list > loon/mc-proxy.tmp
      mv loon/mc-proxy.tmp loon/mc-proxy.list
  - name: Commit Changes
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "github-actions[bot]@users.noreply.github.com"
      git add loon/mc-proxy.list
      if git diff --cached --quiet; then
        echo "No changes"
      else
        git commit -m "auto update mc-proxy"
        git push
      fi
