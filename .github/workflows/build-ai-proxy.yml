name: Build AI Proxy Rules

on:
  workflow_dispatch:

  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build generated ai-proxy.list
        shell: bash
        run: |
          set -e

          mkdir -p loon

          cat > loon/generated/ai-proxy.list <<EOF
          # NAME: MyAI
          # AUTHOR: kgh
          # REPO: https://github.com/hk-js/shuntingRule
          # GENERATED BY GITHUB ACTION
          # UPDATED: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF

          while IFS= read -r url; do
            [ -z "$url" ] && continue
            [[ "$url" =~ ^# ]] && continue

            echo "" >> loon/generated/ai-proxy.list
            echo "# SOURCE: $url" >> loon/generated/ai-proxy.list

            if curl -fsSL "$url" \
              | grep -v '^#' \
              | grep -v '^$' \
              >> loon/generated/ai-proxy.list
            then
              echo "Loaded: $url"
            else
              echo "# FAILED: $url" >> loon/generated/ai-proxy.list
            fi
          done < rules/sources/ai-proxy-source.txt

          awk '!seen[$0]++' loon/generated/ai-proxy.list > loon/generated/ai-proxy.tmp
          mv loon/generated/ai-proxy.tmp loon/generated/ai-proxy.list

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add loon/generated/ai-proxy.list

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto update ai rules"
            git push
          fi
